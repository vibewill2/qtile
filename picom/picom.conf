# Picom compositor config - Rounded corners + Blur

# ─── Backend ──────────────────────────────────────────
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
log-level = "warn";

# ─── Rounded Corners ─────────────────────────────────
corner-radius = 12;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
];

# ─── Blur ─────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@",
];

# ─── Shadows ──────────────────────────────────────────
shadow = true;
shadow-radius = 14;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Dunst'",
    "_GTK_FRAME_EXTENTS@",
];

# ─── Fading ───────────────────────────────────────────
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

# ─── Opacity ──────────────────────────────────────────
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Regras de opacidade (necessário para blur ser visível)
opacity-rule = [
    "90:class_g = 'Alacritty'",
    "90:class_g = 'kitty'",
    "90:class_g = 'Warp'",
    "90:class_g = 'org.wezfurlong.wezterm'",
    "90:class_g = 'Thunar'",
    "70:class_g = 'Nemo'",
];
